name: Update Visual Snapshots

# Run manually from GitHub Actions tab when you intentionally change the design
# and need to refresh the baseline PNGs that CI compares against.
on:
  workflow_dispatch:

jobs:
  update-snapshots:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Regenerate snapshots
        run: npx playwright test tests/visual --update-snapshots

      - name: Commit updated snapshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tests/visual/snapshots.spec.js-snapshots/
          git diff --staged --quiet || git commit -m "chore: update visual snapshot baselines"
          git push
