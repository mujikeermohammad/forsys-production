name: Deploy to Muji FTP

on:
  push:
    branches:
      - 'claude/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: FTP Deploy (upload only, never delete)
        run: |
          lftp -u "${{ secrets.FTP_USERNAME }}","${{ secrets.FTP_PASSWORD }}" "${{ secrets.FTP_SERVER }}" <<EOF
          set ftp:ssl-allow no
          mirror --reverse --parallel=10 --ignore-time \
            --exclude-glob .git \
            --exclude-glob .github \
            --exclude-glob .claude \
            --exclude-glob node_modules \
            ./ /public_html/demos/forsysten/
          quit
          EOF
