      (function() {
        var overlay = document.getElementById('vod-overlay');
        var obj = document.getElementById('obj');
        var shown = false;

        function showOverlay() {
          if (!shown) {
            shown = true;
            overlay.classList.add('active');
            if (obj) obj.classList.add('blurred');
            document.body.style.overflow = 'hidden';
          }
        }

        function hideOverlay() {
          overlay.classList.remove('active');
          if (obj) obj.classList.remove('blurred');
          document.body.style.overflow = '';
          window.scrollTo(0, 0);
          shown = false;
        }

        window.addEventListener('scroll', function() {
          if (window.scrollY > 11) showOverlay();
        });

        document.getElementById('vod-close').addEventListener('click', hideOverlay);
